<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लाइसेन्स खोजी | यातायात व्यवस्था कार्यालय कलंकी</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; margin: 0; padding-top: 30px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        
        h2 { color: #1b5e20; margin-bottom: 1.5rem; font-size: 1.6rem; font-weight: bold; line-height: 1.4; }
        
        input { width: 100%; padding: 12px; margin-bottom: 5px; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 1.1rem; outline: none; transition: border-color 0.3s; text-align: center; color: #000; }
        input:focus { border-color: #1b5e20; }
        
        /* खाली हुँदा देखाउने सन्देशको स्टाइल */
        #emptyError { color: #d32f2f; font-size: 0.9rem; margin-bottom: 10px; display: none; font-weight: bold; }
        
        button { width: 100%; background-color: #d32f2f; color: white; padding: 12px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 5px; }
        button:hover { background-color: #b71c1c; }
        
        #result { margin-top: 1.5rem; padding: 1.2rem; border-radius: 8px; background: #f8f9fa; display: none; border-left: 5px solid #1b5e20; }
        .res-item { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; text-align: left; }
        .res-label { font-size: 0.85rem; color: #70757a; font-weight: bold; margin-bottom: 3px; }
        .res-value { font-size: 1.1rem; color: #202124; }
        
        .box-container { background-color: #e8f5e9; padding: 15px; border-radius: 10px; border: 2px solid #2e7d32; text-align: center; margin-top: 10px; }
        .box-highlight { color: #1b5e20; font-weight: bold; font-size: 2.5rem; display: block; margin-top: 5px; }
        
        .error-msg { color: #d32f2f; margin: 0; text-align: center; font-weight: bold; }
        .error-sub { color: #555; font-size: 0.9rem; font-weight: normal; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>कार्यालयमा प्राप्त मध्ये तपाईंको लाइसेन्स खोजी</h2>
    
    <input type="text" id="licenseInput" placeholder="लाइसेन्स नम्बर (उदा: 01-06-00307225)">
    <div id="emptyError">कृपया लाइसेन्स नम्बर भर्नुहोस् !</div>
    
    <button onclick="searchLicense()">कार्यालयको लिष्टमा खोज्नुहोस्</button>

    <div id="result"></div>
</div>

<script>
    const SUPABASE_URL = 'https://bjnpdbfnzzfuwqsarldo.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqbnBkYmZuenpmdXdxc2FybGRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzI4MzMsImV4cCI6MjA5MzY0ODgzM30.obSe6i4D3XzkcvzjkLb5K1QPbJO6X2mH_KqVvlupuvw';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function searchLicense() {
        const rawInput = document.getElementById('licenseInput').value.trim();
        const resDiv = document.getElementById('result');
        const emptyError = document.getElementById('emptyError');
        
        // यदि इनपुट खाली छ भने पपअपको सट्टा रातो अक्षर देखाउने
        if (!rawInput) {
            emptyError.style.display = 'block';
            resDiv.style.display = 'none';
            document.getElementById('licenseInput').style.borderColor = '#d32f2f';
            return;
        } else {
            emptyError.style.display = 'none';
            document.getElementById('licenseInput').style.borderColor = '#e0e0e0';
        }

        const cleanInput = rawInput.replace(/-/g, '');
        let formattedInput = rawInput;

        if (cleanInput.length === 12) {
            formattedInput = cleanInput.substring(0,2) + '-' + cleanInput.substring(2,4) + '-' + cleanInput.substring(4);
        }

        const { data, error } = await supabaseClient
            .from('licenses')
            .select('"License Number", "License Holder Name", "Box Code", "License Office"')
            .eq('License Number', formattedInput)
            .maybeSingle();

        if (error) {
            console.error(error);
            return;
        }

        resDiv.style.display = 'block';

        if (data) {
            resDiv.innerHTML = `
                <div class="res-item">
                    <div class="res-label">लाइसेन्स नम्बर:</div>
                    <div class="res-value" style="font-weight: bold;">${data["License Number"]}</div>
                </div>
                <div class="res-item">
                    <div class="res-label">धारकको नाम:</div>
                    <div class="res-value">${data["License Holder Name"]}</div>
                </div>
                <div class="res-item">
                    <div class="res-label">कार्यालय:</div>
                    <div class="res-value">${data["License Office"] || "ठूलोभर्‍याङ, कलंकी"}</div>
                </div>
                <div class="res-item" style="border-bottom: none;">
                    <div class="box-container">
                        <div class="res-label" style="color: #2e7d32; font-size: 1rem;">तपाईंको लाइसेन्स रहेको बक्स कोड:</div>
                        <div class="box-highlight">${data["Box Code"]}</div>
                    </div>
                </div>`;
            resDiv.style.borderLeftColor = "#1b5e20";
        } else {
            resDiv.innerHTML = `
                <p class="error-msg">
                    तपाईंले खोज्नुभएको <strong>${rawInput}</strong> नम्बरको लाइसेन्स कार्यालयमा प्राप्त भएको भेटिएन ।<br>
                    <span class="error-sub">कृपया नम्बर पुन: जाँच गर्नुहोला वा नयाँ सूचना कुर्नुहोला ।</span>
                </p>`;
            resDiv.style.borderLeftColor = "#d32f2f";
        }
    }

    // टाइप गर्न थालेपछि रातो सन्देश हराउने बनाउन
    document.getElementById("licenseInput").addEventListener("input", function() {
        document.getElementById('emptyError').style.display = 'none';
        this.style.borderColor = '#1b5e20';
    });

    document.getElementById("licenseInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") searchLicense();
    });
</script>

</body>
</html>
