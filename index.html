<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्मार्ट लाइसेन्स खोज्नुहोस् | यातायात कार्यालय</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1e40af; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: var(--primary); margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1rem; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; }
        #loader { display: none; margin: 20px 0; color: var(--primary); }
        .result-card { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: left; display: none; }
        .success { background: #dcfce7; border: 1px solid #16a34a; }
        .error { background: #fee2e2; border: 1px solid #dc2626; }
        .label { font-weight: bold; color: #475569; font-size: 0.9rem; }
        .value { color: #1e293b; margin-bottom: 8px; font-size: 1.1rem; border-bottom: 1px solid #cbd5e1; padding-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Emblem_of_Nepal.svg/100px-Emblem_of_Nepal.svg.png" alt="Nepal Logo" width="60">
    <h2>स्मार्ट लाइसेन्स खोज्नुहोस्</h2>
    
    <div class="input-group">
        <input type="text" id="licenseInput" placeholder="उदा: 01-06-00828571" onkeypress="if(event.key === 'Enter') searchLicense()">
    </div>
    
    <button onclick="searchLicense()"><i class="fas fa-search"></i> खोज्नुहोस्</button>

    <div id="loader"><i class="fas fa-spinner fa-spin"></i> खोज्दैछ...</div>
    <div id="result" class="result-card"></div>
</div>

<script>
    // तपाइँको विवरण यहाँ ठ्याक्कै मिलाएर राखिएको छ
    const SUPABASE_URL = 'https://bjnpdbfnzzfuwqsarldo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_fEyF1cfrtllCnw5q-CfvbA_mP0PAUpg';
    
    // Client initialization
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function searchLicense() {
        const input = document.getElementById('licenseInput').value.trim();
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        if (!input) {
            alert("कृपया लाइसेन्स नम्बर राख्नुहोस्।");
            return;
        }

        resultDiv.style.display = 'none';
        loader.style.display = 'block';

        try {
            // SECURE RPC CALL
            const { data, error } = await supabaseClient
                .rpc('search_license_secure', { input_num: input });

            loader.style.display = 'none';

            if (error) throw error;

            if (data && data.length > 0) {
                resultDiv.className = 'result-card success';
                let html = `<h3 style="margin:0 0 10px 0; color:#16a34a;">रेकर्ड भेटियो!</h3>`;
                data.forEach(item => {
                    html += `
                        <div class="label">चालकको नाम:</div>
                        <div class="value">${item['License Holder Name']}</div>
                        <div class="label">लाइसेन्स नम्बर:</div>
                        <div class="value">${item['License Number']}</div>
                        <div style="background:#16a34a; color:white; padding:10px; border-radius:5px; margin-top:10px; text-align:center;">
                            <strong>बाकस कोड नम्बर: ${item['Box Code']}</strong>
                        </div>
                        <hr style="margin:15px 0; border:0; border-top:1px solid #16a34a;">
                    `;
                });
                resultDiv.innerHTML = html;
            } else {
                resultDiv.className = 'result-card error';
                resultDiv.innerHTML = `<h3 style="margin:0; color:#dc2626;">भेटिएन!</h3>
                <p>यो नम्बरको लाइसेन्स प्राप्त भएको छैन।</p>`;
            }
            resultDiv.style.display = 'block';

        } catch (err) {
            loader.style.display = 'none';
            console.error(err);
            alert("प्रणालीमा समस्या आयो। कृपया URL र Key चेक गर्नुहोस्।");
        }
    }
</script>

</body>
</html>
