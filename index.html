<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लाइसेन्स खोजी</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        
        /* शीर्षक गाढा हरियो */
        h2 { color: #1b5e20; margin-bottom: 1.5rem; font-size: 1.6rem; font-weight: bold; }
        
        input { width: 100%; padding: 12px; margin-bottom: 1rem; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; outline: none; transition: border-color 0.3s; text-align: center; }
        input:focus { border-color: #1b5e20; }
        
        /* बटन रातो */
        button { width: 100%; background-color: #d32f2f; color: white; padding: 12px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #b71c1c; }
        
        /* Result Styling */
        #result { margin-top: 1.5rem; padding: 1.2rem; border-radius: 8px; background: #f8f9fa; display: none; border-left: 5px solid #1b5e20; }
        .res-item { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; text-align: left; }
        .res-item:last-child { border-bottom: none; }
        .res-label { font-size: 0.85rem; color: #70757a; font-weight: bold; margin-bottom: 3px; }
        .res-value { font-size: 1.1rem; color: #202124; }
        
        /* बक्स कोडको बक्स हरियो रङ्गमा */
        .box-container { background-color: #e8f5e9; padding: 15px; border-radius: 10px; border: 2px solid #2e7d32; text-align: center; margin-top: 10px; }
        .box-highlight { color: #1b5e20; font-weight: bold; font-size: 2.5rem; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>कार्यालयमा प्राप्त मध्ये तपाईको लाइसेन्स खोजी</h2>
    
    <input type="text" id="licenseInput" placeholder="लाइसेन्स नम्बर राख्नुहोस् (Ex: 03-06-...)">
    <button onclick="searchLicense()">कार्यालयको लिष्टमा खोज्नुहोस्</button>

    <div id="result">
        <div class="res-item">
            <div class="res-label">लाइसेन्स नम्बर:</div>
            <div id="resNum" class="res-value" style="font-weight: bold;"></div>
        </div>
        <div class="res-item">
            <div class="res-label">धारकको नाम:</div>
            <div id="resName" class="res-value"></div>
        </div>
        <div class="res-item">
            <div class="res-label">कार्यालय:</div>
            <div id="resOffice" class="res-value"></div>
        </div>
        <div class="res-item" style="border-bottom: none;">
            <div class="box-container">
                <div class="res-label" style="color: #2e7d32; font-size: 1rem;">तपाईको लाईसेन्स रहेको बक्स कोड:</div>
                <div id="resBox" class="box-highlight"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bjnpdbfnzzfuwqsarldo.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqbnBkYmZuenpmdXdxc2FybGRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzI4MzMsImV4cCI6MjA5MzY0ODgzM30.obSe6i4D3XzkcvzjkLb5K1QPbJO6X2mH_KqVvlupuvw';
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function searchLicense() {
        const input = document.getElementById('licenseInput').value.trim();
        const resDiv = document.getElementById('result');
        
        if (!input) {
            alert("कृपया लाइसेन्स नम्बर भर्नुहोस् ।");
            return;
        }

        const { data, error } = await supabaseClient
            .from('licenses')
            .select('"License Number", "License Holder Name", "Box Code", "License Office"')
            .ilike('License Number', `%${input}%`)
            .maybeSingle();

        if (error) {
            console.error("Database Error:", error);
            alert("डाटाबेसमा समस्या देखियो: " + error.message);
            return;
        }

        if (data) {
            resDiv.style.display = 'block';
            document.getElementById('resNum').innerText = data["License Number"];
            document.getElementById('resName').innerText = data["License Holder Name"];
            document.getElementById('resOffice').innerText = data["License Office"] || "ठूलोभर्‍याङ, कलंकी";
            document.getElementById('resBox').innerText = data["Box Code"];
            resDiv.style.borderLeftColor = "#1b5e20";
        } else {
            resDiv.style.display = 'block';
            resDiv.innerHTML = `<p style='color:#d32f2f; margin:0; text-align:center; font-weight:bold;'>
                तपाईले खोज्नुभएको  <strong>${input}</strong> नम्बरको लाइसेन्स कार्यालयमा प्राप्त भएको भेटिएन ।<br>
                <small style="color: #555;">कृपया नम्बर पुन: जाँच गर्नुहोला वा कार्यालयमा अर्को लट प्राप्त भएको सूचना प्राप्त भए पश्चात् पुनः खोजी गर्नुहोला ।</small></p>`;
            resDiv.style.borderLeftColor = "#d32f2f";
        }
    }
</script>

</body>
</html>
