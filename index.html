    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1e40af; --bg: #f8fafc; --success: #16a34a; --error: #dc2626; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h2 { color: var(--primary); margin: 15px 0 5px 0; font-size: 1.4rem; }
        .info-text { font-size: 0.9rem; color: #475569; background: #eff6ff; padding: 10px; border-radius: 8px; margin-bottom: 20px; line-height: 1.5; border-left: 4px solid var(--primary); }
        .input-group { margin-bottom: 1rem; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold; }
        button:disabled { background: #94a3b8; }
        #loader { display: none; margin: 20px 0; color: var(--primary); font-weight: bold; }
        .result-card { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: left; display: none; }
        .success { background: #f0fdf4; border: 1px solid var(--success); }
        .error { background: #fef2f2; border: 1px solid var(--error); }
        .label { font-weight: bold; color: #64748b; font-size: 0.8rem; margin-bottom: 2px; }
        .value { color: #1e293b; margin-bottom: 12px; font-size: 1.05rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
        .box-highlight { background: var(--primary); color: white; padding: 10px; border-radius: 6px; margin-top: 10px; text-align: center; font-size: 1.1rem; }
    </style>
</head>

    <h2>सवारी चालक अनुमति-पत्र खोज्नुहोस्</h2>
    
    <div class="info-text">
        यो पेजबाट <strong>यातायात व्यवस्था कार्यालय, कलंकी (ठूलो भर्याङ)</strong> मा राजश्व बुझाउनु भएको लाइसेन्सहरु मात्र खोज्न सकिन्छ ।
    </div>

    <div class="input-group">
        <input type="text" id="licenseInput" placeholder="लाइसेन्स नम्बर राख्नुहोस् (उदा: 01-06-00828571)" autocomplete="off">
    </div>
    
    <button id="searchBtn" onclick="searchLicense()"><i class="fas fa-search"></i> खोज्नुहोस्</button>

    <div id="loader"><i class="fas fa-spinner fa-spin"></i> खोज्दैछ, कृपया पर्खनुहोस्...</div>
    <div id="result" class="result-card"></div>
</div>

<script>
    const SUPABASE_URL = 'https://bjnpdbfnzzfuwqsarldo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_fEyF1cfrtllCnw5q-CfvbA_mP0PAUpg';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const inputField = document.getElementById('licenseInput');
    const resultDiv = document.getElementById('result');
    const loader = document.getElementById('loader');
    const searchBtn = document.getElementById('searchBtn');

    inputField.addEventListener('click', () => {
        resultDiv.style.display = 'none';
        resultDiv.innerHTML = '';
    });

    inputField.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchLicense();
    });

    async function searchLicense() {
        const input = inputField.value.trim();
        if (!input) {
            alert("कृपया लाइसेन्स नम्बर राख्नुहोस्।");
            return;
        }

        const originalBtnText = searchBtn.innerHTML;
        searchBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> खोज्दैछु...';
        searchBtn.disabled = true;
        resultDiv.style.display = 'none';
        loader.style.display = 'block';

        try {
            const { data, error } = await supabaseClient
                .rpc('search_license_secure', { input_num: input });

            loader.style.display = 'none';
            searchBtn.innerHTML = originalBtnText;
            searchBtn.disabled = false;

            if (error) throw error;

            if (data && data.length > 0) {
                resultDiv.className = 'result-card success';
                let html = `<h3 style="margin-top:0; color:var(--success); text-align:center;">रेकर्ड भेटियो!</h3>`;
                
                data.forEach((item) => {
                    html += `
                        <div style="background: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #dcfce7;">
                            <div class="label">चालकको नाम:</div>
                            <div class="value">${item['License Holder Name']}</div>
                            <div class="label">लाइसेन्स नम्बर:</div>
                            <div class="value">${item['License Number']}</div>
                            <div class="label">वर्ग (Category):</div>
                            <div class="value">${item['Category'] || 'N/A'}</div>
                            <div class="box-highlight">
                                <strong>बाकस कोड नम्बर: ${item['Box Code']}</strong>
                            </div>
                        </div>
                    `;
                });
                resultDiv.innerHTML = html;
            } else {
                resultDiv.className = 'result-card error';
                resultDiv.innerHTML = `
                    <div style="text-align: center;">
                        <h3 style="margin-top:0; color:var(--error);">भेटिएन!</h3>
                        <p style="color: #444; line-height: 1.6;">
                            कार्यालयको अभिलेख अनुसार तपाईको लाइसेन्स कार्यालयमा प्राप्त भएको देखिएन । 
                            कार्यालयले आफ्नो वेवसाईटमा सूचना प्रकाशन गरेपछि पुनः खोजी गर्नुहोला ।
                        </p>
                    </div>`;
            }
            resultDiv.style.display = 'block';

        } catch (err) {
            loader.style.display = 'none';
            searchBtn.innerHTML = originalBtnText;
            searchBtn.disabled = false;
            alert("प्रणालीमा समस्या आयो। कृपया पुनः प्रयास गर्नुहोस्।");
        }
    }
</script>
