<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लाइसेन्स खोजी | यातायात व्यवस्था कार्यालय कलंकी</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; margin: 0; padding: 15px; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        
        h2 { color: #1b5e20; margin-bottom: 1rem; font-size: 1.3rem; font-weight: bold; line-height: 1.3; }
        
        input { width: 100%; padding: 10px; margin-bottom: 5px; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; outline: none; text-align: center; }
        input:focus { border-color: #1b5e20; }
        
        #emptyError { color: #d32f2f; font-size: 0.85rem; margin-bottom: 8px; display: none; font-weight: bold; }
        
        button { width: 100%; background-color: #d32f2f; color: white; padding: 12px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        #result { margin-top: 1rem; padding: 0.8rem; border-radius: 8px; background: #f8f9fa; display: none; border-left: 5px solid #1b5e20; }
        .res-item { margin-bottom: 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; text-align: left; }
        .res-item:last-child { border-bottom: none; }
        .res-label { font-size: 0.75rem; color: #70757a; font-weight: bold; }
        .res-value { font-size: 1rem; color: #202124; font-weight: 500; }
        
        .box-container { background-color: #e8f5e9; padding: 10px; border-radius: 8px; border: 2px solid #2e7d32; text-align: center; margin-top: 5px; }
        .box-highlight { color: #1b5e20; font-weight: bold; font-size: 2.2rem; display: block; }
        
        .error-msg { color: #d32f2f; font-size: 0.95rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>तपाईंको लाइसेन्स खोजी</h2>
    
    <input type="text" id="licenseInput" placeholder="लाइसेन्स नम्बर (उदा: 01-06-...)">
    <div id="emptyError">कृपया लाइसेन्स नम्बर भर्नुहोस् !</div>
    
    <button onclick="searchLicense()">खोज्नुहोस्</button>

    <div id="result"></div>
</div>

<script>
    const SUPABASE_URL = 'https://bjnpdbfnzzfuwqsarldo.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJqbnBkYmZuenpmdXdxc2FybGRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzI4MzMsImV4cCI6MjA5MzY0ODgzM30.obSe6i4D3XzkcvzjkLb5K1QPbJO6X2mH_KqVvlupuvw';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function searchLicense() {
        const rawInput = document.getElementById('licenseInput').value.trim();
        const resDiv = document.getElementById('result');
        const emptyError = document.getElementById('emptyError');
        
        if (!rawInput) {
            emptyError.style.display = 'block';
            resDiv.style.display = 'none';
            return;
        }

        emptyError.style.display = 'none';
        const cleanInput = rawInput.replace(/-/g, '');
        let formattedInput = rawInput;

        if (cleanInput.length === 12) {
            formattedInput = cleanInput.substring(0,2) + '-' + cleanInput.substring(2,4) + '-' + cleanInput.substring(4);
        }

        const { data, error } = await supabaseClient
            .from('licenses')
            .select('"License Number", "License Holder Name", "Box Code", "License Office"')
            .eq('License Number', formattedInput)
            .maybeSingle();

        resDiv.style.display = 'block';

        if (data) {
            resDiv.innerHTML = `
                <div class="res-item">
                    <div class="res-label">धारकको नाम:</div>
                    <div class="res-value">${data["License Holder Name"]}</div>
                </div>
                <div class="res-item">
                    <div class="res-label">लाइसेन्स नम्बर:</div>
                    <div class="res-value">${data["License Number"]}</div>
                </div>
                <div class="box-container">
                    <div class="res-label" style="color: #2e7d32;">बक्स कोड नम्बर:</div>
                    <div class="box-highlight">${data["Box Code"]}</div>
                </div>`;
            resDiv.style.borderLeftColor = "#1b5e20";
        } else {
            resDiv.innerHTML = `<p class="error-msg">नम्बर फेला परेन। कृपया पुनः जाँच गर्नुहोस्।</p>`;
            resDiv.style.borderLeftColor = "#d32f2f";
        }
    }

    document.getElementById("licenseInput").addEventListener("input", () => {
        document.getElementById('emptyError').style.display = 'none';
    });

    document.getElementById("licenseInput").addEventListener("keypress", (e) => {
        if (e.key === "Enter") searchLicense();
    });
</script>

</body>
</html>
